{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ContactSphere - Modern Contact Directory{% endblock %}</title>
    
    <!-- Link to custom stylesheets -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Main Navigation">
            <a href="{% url 'home' %}" class="logo-link" id="nav-logo">
                <div class="logo-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <span>Contact<span>Sphere</span></span>
            </a>
            
            <div class="nav-actions">
                <a href="{% url 'create_contact' %}" class="btn btn-primary" id="btn-nav-create">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>New Contact</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}
        <!-- Content will be injected here -->
        {% endblock %}
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; {% now "Y" %} ContactSphere. Built with Django & Premium Glassmorphism UI.</p>
        </div>
    </footer>

    <!-- Link to custom scripts -->
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
