{% extends 'base.html' %}

{% block title %}Delete Contact - ContactSphere{% endblock %}

{% block content %}
<div class="glass-card delete-card">
    <div class="delete-warning-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
    </div>
    
    <h2>Delete Contact</h2>
    <p>Are you sure you want to permanently delete <strong>{{ contact.name }}</strong>? This action cannot be undone.</p>
    
    <form action="" method="POST" id="delete-contact-form">
        {% csrf_token %}
        <div class="form-actions" style="justify-content: center;">
            <a href="{% url 'home' %}" class="btn btn-secondary" id="btn-delete-cancel">Cancel</a>
            <button type="submit" class="btn btn-danger" id="btn-delete-submit">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                <span>Delete Permanently</span>
            </button>
        </div>
    </form>
</div>
{% endblock %}
